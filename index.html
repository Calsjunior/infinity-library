<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Infinity Library</title>

        <link rel="stylesheet" href="css/reset.css">
        <link rel="stylesheet" href="css/style.css">

        <script src="js/main.js" defer></script>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=IM+Fell+English:ital@0;1&display=swap"
            rel="stylesheet"
        >
    </head>
    <body>
        <div class="bookshelf"></div>
        <div class="shelf"></div>
        <button
            type="button"
            command="show-modal"
            commandfor="add-book-dialog"
            id="open-dialog"
        >
            New book
        </button>

        <dialog class="cover" id="add-book-dialog">
            <form class="cover__form" method="dialog" id="add-book-form">
                <div class="ribbon">
                    <button class="ribbon__button" type="submit"></button>
                </div>

                <header class="cover__header">
                    <input
                        class="cover__input cover__title"
                        type="text"
                        name="book-title"
                        id="book-title"
                        placeholder="TITLE"
                        required
                    >

                    <input
                        class="cover__input cover__author"
                        type="text"
                        name="book-author"
                        id="book-author"
                        placeholder="by Unknown Author"
                        required
                    >
                </header>

                <div class="cover__body"><span class="cover__ornament">❧</span></div>

                <footer class="cover__footer">
                    <div class="cover__stamp">
                        <input
                            class="cover__input cover__status"
                            type="checkbox"
                            id="book-status"
                        >
                        <label class="seal" for="book-status">
                            <span class="seal__embossed"></span>
                            <span class="cover__label seal__label"></span>
                        </label>
                    </div>

                    <div class="cover__pages">
                        <input
                            class="cover__input cover__unit"
                            type="number"
                            name="book-pages"
                            id="book-pages"
                            placeholder="000"
                            required
                        >
                        <span class="cover__label">pp.</span>
                    </div>
                </footer>
            </form>
        </dialog>
    </body>
</html>
