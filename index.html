<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="A brief description of the page for SEO">
        <title>Infinity Library</title>

        <link rel="stylesheet" href="css/reset.css">
        <link rel="stylesheet" href="css/style.css">

        <script src="js/main.js" defer></script>
    </head>
    <body>
        <div class="bookshelf"></div>
        <button type="button" command="show-modal" commandfor="add-book-dialog">
            New book
        </button>

        <dialog class="book" id="add-book-dialog">
            <button class="book__ribbon" type="button"></button>

            <form class="cover" method="dialog" id="add-book-form">
                <header class="cover__header">
                    <input
                        class="cover__input cover__title"
                        type="text"
                        name="book-title"
                        id="book-title"
                        placeholder="TITLE"
                        required
                    >

                    <input
                        class="cover__input cover__author"
                        type="text"
                        name="book-author"
                        id="book-author"
                        placeholder="by Unknown Author"
                        required
                    >
                </header>

                <div class="cover__body"><span class="cover__ornament">❧</span></div>

                <footer class="cover__footer">
                    <div class="cover__stamp">
                        <input
                            class="cover__input cover__status"
                            type="checkbox"
                            id="book-status"
                        >
                        <label class="cover__label" for="book-status">Unread</label>
                    </div>

                    <div class="cover__pages">
                        <input class="cover__input cover__unit" type="number">
                        <span class="cover__label">pp.</span>
                    </div>
                </footer>
            </form>
        </dialog>
    </body>
</html>
